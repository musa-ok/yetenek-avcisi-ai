<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Gradient Background -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19"/>
      <stop offset="50%" stop-color="#151C2B"/>
      <stop offset="100%" stop-color="#0B0F19"/>
    </linearGradient>
    
    <!-- Glow Effect -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <!-- Inner Shadow for depth -->
    <filter id="innerShadow">
      <feOffset dx="0" dy="4"/>
      <feGaussianBlur stdDeviation="6" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="#000000" flood-opacity="0.3" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bgGradient)" rx="220" ry="220"/>
  
  <!-- Subtle grid pattern -->
  <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
    <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#00FF87" stroke-width="0.5" opacity="0.05"/>
  </pattern>
  <rect width="1024" height="1024" fill="url(#grid)" rx="220" ry="220"/>
  
  <!-- Main Icon Group -->
  <g transform="translate(512, 512)">
    <!-- Outer Ring -->
    <circle cx="0" cy="0" r="320" fill="none" stroke="#00FF87" stroke-width="8" opacity="0.3"/>
    <circle cx="0" cy="0" r="300" fill="none" stroke="#00FF87" stroke-width="4" opacity="0.5"/>
    
    <!-- Inner Circle Background -->
    <circle cx="0" cy="0" r="260" fill="#151C2B" opacity="0.8"/>
    
    <!-- Football / Soccer Ball Stylized -->
    <g filter="url(#glow)">
      <!-- Main Ball Shape -->
      <circle cx="0" cy="0" r="200" fill="#0B0F19" stroke="#00FF87" stroke-width="6"/>
      
      <!-- Football Pattern - Pentagon Center -->
      <polygon points="0,-80 76,-25 47,65 -47,65 -76,-25" fill="none" stroke="#00FF87" stroke-width="5" stroke-linejoin="round"/>
      
      <!-- Connecting Lines -->
      <line x1="0" y1="-80" x2="0" y2="-200" stroke="#00FF87" stroke-width="4"/>
      <line x1="76" y1="-25" x2="190" y2="-60" stroke="#00FF87" stroke-width="4"/>
      <line x1="47" y1="65" x2="120" y2="160" stroke="#00FF87" stroke-width="4"/>
      <line x1="-47" y1="65" x2="-120" y2="160" stroke="#00FF87" stroke-width="4"/>
      <line x1="-76" y1="-25" x2="-190" y2="-60" stroke="#00FF87" stroke-width="4"/>
      
      <!-- Side Pentagons (simplified as arcs) -->
      <path d="M 0,-200 Q 60,-160 76,-25" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.6"/>
      <path d="M 190,-60 Q 150,40 47,65" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.6"/>
      <path d="M 120,160 Q 40,200 -47,65" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.6"/>
      <path d="M -120,160 Q -40,200 47,65" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.6"/>
      <path d="M -190,-60 Q -150,40 -76,-25" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.6"/>
      
      <!-- Star/Spark in center representing Talent -->
      <g transform="translate(0, 10)">
        <polygon points="0,-25 7,-8 24,-8 11,3 16,20 0,10 -16,20 -11,3 -24,-8 -7,-8" fill="#00FF87"/>
      </g>
    </g>
    
    <!-- Decorative Arcs -->
    <path d="M -280,-100 Q -350,0 -280,100" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.4"/>
    <path d="M 280,-100 Q 350,0 280,100" fill="none" stroke="#00FF87" stroke-width="3" opacity="0.4"/>
    
    <!-- Bottom accent line -->
    <line x1="-100" y1="380" x2="100" y2="380" stroke="#00FF87" stroke-width="4" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- Corner highlights for glassmorphism effect -->
  <path d="M 120,120 Q 220,80 350,80" fill="none" stroke="#00FF87" stroke-width="2" opacity="0.2"/>
  <path d="M 904,120 Q 804,80 674,80" fill="none" stroke="#00FF87" stroke-width="2" opacity="0.2"/>
</svg>
